<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="55%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef6ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .title{font-family:Arial,Helvetica,sans-serif;font-size:56px;font-weight:800;fill:#0ea5e9}
      .subtitle{font-family:Arial,Helvetica,sans-serif;font-size:20px;font-weight:600;fill:#64748b}
      .col-title{font-family:Arial,Helvetica,sans-serif;font-size:30px;font-weight:800;fill:#111827}
      .card-text{font-family:Arial,Helvetica,sans-serif;font-size:24px;font-weight:800;fill:#111827}
      .small{font-family:Arial,Helvetica,sans-serif;font-size:16px;font-weight:700;fill:#64748b}
      .pill{rx:24;filter:url(#shadow)}
      .divider{stroke:#e2e8f0;stroke-width:2;stroke-dasharray:6 10}
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1450" cy="70" r="130" fill="#dbeafe" opacity="0.55"/>
