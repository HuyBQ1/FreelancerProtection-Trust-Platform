    <text x="92" y="35" font-family="Arial,Helvetica,sans-serif" font-size="27" font-weight="900" fill="#dc2626">FPTP</text>
    <text x="92" y="62" font-family="Arial,Helvetica,sans-serif" font-size="17" font-weight="700" fill="#64748b">Trust Platform Project</text>
